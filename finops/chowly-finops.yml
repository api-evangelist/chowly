description: >-
  FinOps view of Chowly spend. Chowly is sold through a sales-led, quote-based
  subscription model priced per restaurant and per location based on the
  products enabled (order integration, menu sync, smart/dynamic pricing,
  marketing, loyalty, analytics). It is not metered per API call and does not
  publish usage-based API pricing, so cost is governed by the negotiated
  subscription rather than per-token or per-request meters. Specific rates are
  not reconciled in this artifact.
notes: >-
  Pricing is custom and not published; cost meters below are subscription- and
  location-oriented placeholders. Reconcile against the negotiated Chowly
  agreement and any invoice line items.
sources:
- https://www.chowly.com
- https://www.chowly.com/chowly-platform/
