meters:
- name: location_subscription
  description: Per-location platform subscription fee, set by negotiated agreement.
  unit: locations
  aggregation: sum
  dimensions:
  - account
  - location
- name: enabled_products
  description: Products turned on per location (order integration, menu sync, pricing, marketing, loyalty, analytics).
  unit: products
  aggregation: sum
  dimensions:
  - account
  - location
  - product
- name: connected_channels
  description: Third-party and direct ordering channels connected per location.
  unit: channels
  aggregation: sum
  dimensions:
  - account
  - location
principles:
- name: Visibility
  description: Track per-location subscription line items and which products are enabled per restaurant.
- name: Allocation
  description: Map Chowly subscription cost to locations and brands/franchisees.
- name: Optimization
  description: Disable unused products/channels per location; consolidate menus via MenuMatch to reduce operational overhead.
- name: Accountability
  description: Assign an owner per location/brand; review the Chowly subscription against order volume and direct-ordering growth.
