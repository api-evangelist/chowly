description: >-
  Chowly is sold through a sales-led, quote-based model. Pricing is not
  publicly published. Plans are quoted per restaurant and per location based on
  the products turned on (order integration, menu sync/MenuMatch, smart/dynamic
  pricing, marketing, loyalty, and analytics). There is no self-serve developer
  tier or published per-call API pricing; access to the partner-gated POS
  integration API is provisioned as part of a commercial agreement. Specific
  plan names and prices are not reconciled in this artifact.
notes: >-
  Pricing is custom and sales-led; figures are not published by Chowly. Contact
  Chowly sales for a per-location quote. Reconcile against any published pricing
  if Chowly introduces transparent tiers.
sources:
- https://www.chowly.com
- https://www.chowly.com/chowly-platform/
- https://www.capterra.com/p/212043/Chowly/
